<section [class]="panelClasses()">
  <header class="flex items-start justify-between gap-3 px-4 pt-3.5">
    <div class="min-w-0 flex-1">
      @if (eyebrow()) {
        <p class="text-xs font-bold uppercase leading-4 tracking-[0.08em] text-[var(--text3-tertiary)]">
          {{ eyebrow() }}
        </p>
      }
      <h2 [class]="titleClasses()">{{ title() }}</h2>
    </div>

    <div class="flex shrink-0 items-center gap-2">
      <ng-content select="[panelActions]" />
    </div>
  </header>

  <div [class]="contentClasses()">
    <ng-content />
  </div>
</section>
